<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <title>Thank You | DreamDesigns E-Invites</title>
  <meta name="description" content="Thank you for contacting DreamDesigns E-Invites." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Playfair+Display:wght@600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --cream: #fff9ef;
      --ivory: #fffdf7;
      --gold: #bd8b2f;
      --gold-light: #dfc07a;
      --brown: #33251d;
      --muted: rgba(51, 37, 29, 0.68);
      --line: rgba(189, 139, 47, 0.2);
      --shadow: 0 26px 80px rgba(79, 52, 28, 0.13);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      color: var(--brown);
      background:
        radial-gradient(circle at 12% 10%, rgba(223,192,122,.35), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(189,139,47,.14), transparent 30%),
        linear-gradient(180deg, #fffaf1, #fff6e8);
      display: grid;
      place-items: center;
      padding: 24px;
      overflow-x: hidden;
    }

    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: -1;
    }

    .glow-one {
      width: 430px;
      height: 430px;
      background: rgba(223,192,122,.38);
      top: -150px;
      left: -130px;
    }

    .glow-two {
      width: 460px;
      height: 460px;
      background: rgba(189,139,47,.16);
      right: -150px;
      bottom: -120px;
    }

    .thank-card {
      width: min(100%, 780px);
      padding: clamp(34px, 6vw, 70px);
      border-radius: 34px;
      background: rgba(255,255,255,.86);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: fadeUp .8s ease both;
    }

    .thank-card::before {
      content: "";
      position: absolute;
      inset: 16px;
      border-radius: 26px;
      border: 1px solid rgba(189,139,47,.18);
      pointer-events: none;
    }

    .icon {
      width: 86px;
      height: 86px;
      margin: 0 auto 26px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      color: white;
      font-size: 2.4rem;
      font-weight: 900;
      box-shadow: 0 18px 44px rgba(189,139,47,.25);
    }

    .eyebrow {
      color: var(--gold);
      font-size: .76rem;
      font-weight: 800;
      letter-spacing: .18em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      font-size: clamp(2.8rem, 7vw, 5.4rem);
      line-height: .9;
      letter-spacing: -.06em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.35rem, 3vw, 2.2rem);
      color: var(--brown);
      margin-bottom: 16px;
    }

    p {
      max-width: 560px;
      margin: 0 auto;
      color: var(--muted);
      line-height: 1.8;
    }

    .buttons {
      margin-top: 34px;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    a {
      min-height: 54px;
      padding: 15px 25px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      text-decoration: none;
      transition: .25s ease;
    }

    a:hover {
      transform: translateY(-4px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      color: white;
      box-shadow: 0 18px 44px rgba(189,139,47,.24);
    }

    .btn-secondary {
      background: white;
      color: var(--gold);
      border: 1px solid var(--line);
    }

    .email {
      margin-top: 28px;
      padding: 16px 18px;
      border-radius: 18px;
      background: var(--ivory);
      border: 1px solid var(--line);
      color: var(--gold);
      font-weight: 800;
      display: inline-block;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .buttons {
        flex-direction: column;
      }

      a {
        width: 100%;
      }

      .thank-card {
        border-radius: 26px;
      }
    }
  </style>

</head>

<body>
